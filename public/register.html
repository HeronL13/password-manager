<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Criar Conta</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Cria conta</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Seu nome"
required
>

<input
type="email"
id="email"
placeholder="Seu email"
required
>

<input
type="password"
id="password"
placeholder="Crie uma senha"
required
>

<button type="submit">
Cadastrar
</button>

</form>

<p>

Já possui conta?
<a href="login.html">Fazer Login</a>

</p>

</div>

<script src="script.js"></script>

</body>
</html>
