<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Manager | Cadastro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="page">


<div class="lock-area">

<img src="images/lock.png" alt="Cadeado com asas" class="lock">

</div>


<div class="container">

<h2>Cria conta</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Nome"
required

>

<input
type="email"
id="email"
placeholder="Email"
required

>

<input
type="password"
id="password"
placeholder="Senha"
required

>

<button type="submit">
Cadastrar
</button>

</form>

<p>
Já possui conta?
<a href="login.html">Fazer Login</a>
</p>

</div>

</div>

<script src="js/script.js"></script>

</body>

</html>
